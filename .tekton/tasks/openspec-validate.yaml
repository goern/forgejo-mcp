apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: openspec-validate
  annotations:
    tekton.dev/displayName: "openspec validate --all --strict + check anchored demos"
spec:
  params:
    - name: RELEASE_TOOLS_IMAGE
      description: |
        Pre-built release-tools image containing openspec (and other tools).
      type: string
      default: codeberg.org/operate-first/release-tools:latest
  workspaces:
    - name: source
      mountPath: /workspace/src
  steps:
    - name: validate
      image: $(params.RELEASE_TOOLS_IMAGE)
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -eu
        openspec validate --all --strict --no-interactive
    - name: check-demos
      image: $(params.RELEASE_TOOLS_IMAGE)
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -eu
        # Validate anchored Showboat demos against their specs.
        # POSIX sh; no extra tooling beyond coreutils + git.
        ./scripts/ci/check-spec-demo-anchors.sh
