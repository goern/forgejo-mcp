apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: release-tools-syft-scan-image
  annotations:
    tekton.dev/displayName: "syft SBOM scan of release-tools image"
spec:
  params:
    - name: IMAGE_REF
      description: Full image reference to scan (tag or tag@digest).
      type: string
    - name: OUTPUT_FORMAT
      description: syft output format.
      type: string
      default: cyclonedx-json
    - name: STORAGE_DRIVER
      description: buildah storage driver.
      type: string
      default: vfs
  workspaces:
    - name: source
      mountPath: /workspace/source
  results:
    - name: SBOM_PATH
      description: Workspace-relative path of the emitted SBOM file.
  steps:
    - name: scan
      image: quay.io/buildah/stable:latest
      securityContext:
        privileged: true
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        IMAGE="$(params.IMAGE_REF)"
        SBOM_FILE="$(workspaces.source.path)/release-tools-sbom.cdx.json"

        echo "Scanning ${IMAGE} with syft..."

        # Run syft from within a container built from the image itself
        # (syft is bundled in the release-tools image).
        buildah from --storage-driver="$(params.STORAGE_DRIVER)" --name sbom-ctr "${IMAGE}"
        buildah run \
          --storage-driver="$(params.STORAGE_DRIVER)" \
          --volume "$(workspaces.source.path):/scan-out:Z" \
          sbom-ctr -- \
          syft "${IMAGE}" \
            --output "$(params.OUTPUT_FORMAT)=/scan-out/release-tools-sbom.cdx.json"
        buildah rm sbom-ctr

        printf '%s' "release-tools-sbom.cdx.json" > "$(results.SBOM_PATH.path)"
        echo "SBOM written to ${SBOM_FILE}"
