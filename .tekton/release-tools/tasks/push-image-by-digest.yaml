apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: release-tools-push-image-by-digest
  annotations:
    tekton.dev/displayName: "push release-tools image to registry by digest (no tag)"
spec:
  description: |
    # TBD — coordinate with op1st-emea-b4mad maintainers before merge
    # Registry: quay.io/operate-first/release-tools
    #
    # L1 TOCTOU fix: push manifest by digest ONLY here. The human-readable
    # vMAJOR.MINOR.PATCH tag is promoted AFTER cosign-sign succeeds (T9).
    # This closes the window where an unsigned image could be advertised.
  params:
    - name: IMAGE
      description: |
        Local image tag to push (e.g. release-tools:build-tmp). Must already
        exist in the buildah store in the workspace.
        # TBD — coordinate with op1st-emea-b4mad maintainers before merge
        # Registry path working assumption: quay.io/operate-first/release-tools
      type: string
    - name: REGISTRY_IMAGE
      description: |
        Full registry path without tag (e.g. quay.io/operate-first/release-tools).
        # TBD — coordinate with op1st-emea-b4mad maintainers before merge
        # Working assumption: quay.io/operate-first/release-tools
      type: string
      default: "quay.io/operate-first/release-tools"
    - name: STORAGE_DRIVER
      description: buildah storage driver.
      type: string
      default: vfs
  workspaces:
    - name: source
      mountPath: /workspace/source
    - name: registry-credentials
      mountPath: /workspace/registry-creds
      optional: false
  results:
    - name: IMAGE_DIGEST
      description: sha256 digest of the pushed manifest (e.g. sha256:abc123...).
    - name: IMAGE_REPO_DIGEST
      description: Full digest reference (e.g. quay.io/operate-first/release-tools@sha256:abc123).
  steps:
    - name: push-by-digest
      image: quay.io/buildah/stable:latest
      securityContext:
        privileged: true
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Configure registry auth
        REGISTRY_AUTH_FILE="$(workspaces.registry-credentials.path)/.dockerconfigjson"
        if [ ! -f "${REGISTRY_AUTH_FILE}" ]; then
          REGISTRY_AUTH_FILE="$(workspaces.registry-credentials.path)/config.json"
        fi

        LOCAL_IMAGE="$(params.IMAGE)"
        REGISTRY_IMAGE="$(params.REGISTRY_IMAGE)"

        echo "Pushing ${LOCAL_IMAGE} to ${REGISTRY_IMAGE} by digest (no tag)..."

        # Push manifest only — no human-readable tag yet (L1 TOCTOU fix).
        DIGEST=$(buildah push \
          --storage-driver="$(params.STORAGE_DRIVER)" \
          --authfile="${REGISTRY_AUTH_FILE}" \
          --digestfile=/tmp/pushed-digest \
          "${LOCAL_IMAGE}" \
          "docker://${REGISTRY_IMAGE}" \
          2>&1 | tee /dev/stderr; cat /tmp/pushed-digest || true)

        DIGEST=$(cat /tmp/pushed-digest)
        REPO_DIGEST="${REGISTRY_IMAGE}@${DIGEST}"

        printf '%s' "${DIGEST}" > "$(results.IMAGE_DIGEST.path)"
        printf '%s' "${REPO_DIGEST}" > "$(results.IMAGE_REPO_DIGEST.path)"

        echo "Pushed by digest: ${REPO_DIGEST}"
