apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: release-tools-build-image
  annotations:
    tekton.dev/displayName: "buildah build — release-tools image (no push)"
spec:
  params:
    - name: IMAGE
      description: Local image tag to assign to the built image (e.g. release-tools:pr-$(context.pipelineRun.name)).
      type: string
    - name: CONTEXT
      description: Path within the workspace to pass as the build context.
      type: string
      default: image/release-tools
    - name: CONTAINERFILE
      description: Path to the Containerfile relative to CONTEXT.
      type: string
      default: Containerfile
    - name: STORAGE_DRIVER
      description: buildah storage driver.
      type: string
      default: vfs
  workspaces:
    - name: source
      mountPath: /workspace/source
  results:
    - name: IMAGE_DIGEST
      description: sha256 digest of the built image manifest.
    - name: IMAGE_REF
      description: Full image reference (tag@digest) of the built image.
  steps:
    - name: build
      image: quay.io/buildah/stable:latest
      securityContext:
        privileged: true
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        buildah --version

        buildah bud \
          --storage-driver="$(params.STORAGE_DRIVER)" \
          --file="$(params.CONTEXT)/$(params.CONTAINERFILE)" \
          --tag="$(params.IMAGE)" \
          "$(params.CONTEXT)"

        DIGEST=$(buildah inspect --type image --format '{{.FromImageDigest}}' "$(params.IMAGE)" 2>/dev/null \
          || buildah images --format '{{.ID}}' "$(params.IMAGE)")
        IMAGE_DIGEST=$(buildah inspect --type image --format '{{index .ImageAnnotations "org.opencontainers.image.revision"}}' "$(params.IMAGE)" 2>/dev/null || true)

        # Capture the real manifest digest
        DIGEST=$(buildah manifest inspect "$(params.IMAGE)" 2>/dev/null \
          | grep -oP '"Digest"\s*:\s*"\Ksha256:[a-f0-9]+' \
          || buildah inspect --format '{{.FromImageDigest}}' "$(params.IMAGE)")

        printf '%s' "${DIGEST}" > "$(results.IMAGE_DIGEST.path)"
        printf '%s@%s' "$(params.IMAGE)" "${DIGEST}" > "$(results.IMAGE_REF.path)"

        echo "Built: $(params.IMAGE) digest=${DIGEST}"
