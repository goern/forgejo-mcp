apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: release-tools-build-image
  annotations:
    tekton.dev/displayName: "buildah build — release-tools image (no push)"
spec:
  params:
    - name: IMAGE
      description: Local image tag to assign to the built image (e.g. release-tools:pr-$(context.pipelineRun.name)).
      type: string
    - name: CONTEXT
      description: Path within the workspace to pass as the build context.
      type: string
      default: image/release-tools
    - name: CONTAINERFILE
      description: Path to the Containerfile relative to CONTEXT.
      type: string
      default: Containerfile
    - name: STORAGE_DRIVER
      description: buildah storage driver.
      type: string
      default: vfs
    - name: ISOLATION
      description: buildah isolation mode. chroot works under OpenShift container-build SCC without privileged.
      type: string
      default: chroot
  workspaces:
    - name: source
      mountPath: /workspace/source
  results:
    - name: IMAGE_DIGEST
      description: |
        sha256 digest of the built image manifest. Empty for pre-push (PR)
        builds; the real manifest digest is captured by push-image-by-digest.
    - name: IMAGE_REF
      description: Full image reference (tag@digest) of the built image.
  steps:
    - name: build
      image: quay.io/buildah/stable:latest
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        buildah --version

        buildah bud \
          --isolation="$(params.ISOLATION)" \
          --storage-driver="$(params.STORAGE_DRIVER)" \
          --file="$(params.CONTEXT)/$(params.CONTAINERFILE)" \
          --tag="$(params.IMAGE)" \
          "$(params.CONTEXT)"

        # Verify the build succeeded by checking the image exists locally.
        # The real manifest digest is only stable after a registry push (captured
        # by --digestfile in push-image-by-digest). Leave IMAGE_DIGEST empty here.
        IMAGE_ID=$(buildah images --no-trunc --format '{{.ID}}' "$(params.IMAGE)" | head -1)
        if [ -z "${IMAGE_ID}" ]; then
          echo "ERROR: image not found in local store after build" >&2
          exit 1
        fi
        echo "Built: $(params.IMAGE) local-id=${IMAGE_ID}"

        printf '' > "$(results.IMAGE_DIGEST.path)"
        printf '%s' "$(params.IMAGE)" > "$(results.IMAGE_REF.path)"
