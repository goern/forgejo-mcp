apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: release-tools-promote-image-tag
  annotations:
    tekton.dev/displayName: "promote release-tools image to human-readable tag"
spec:
  description: |
    Runs LAST in the publish pipeline, after cosign-sign and SBOM-attach have
    both succeeded. The version tag (:vMAJOR.MINOR.PATCH) was already pushed
    and signed in place by the earlier tasks; this task only adds the :latest
    tag, and only for stable releases.

    # bd forgejo-mcp-9r4: this task no longer copies :vX.Y.Z (already pushed)
    # and no longer deletes a :build-tmp staging tag. Deleting a tag on
    # Forgejo/Codeberg deletes the shared manifest, which previously removed
    # the just-promoted :vX.Y.Z and :latest tags. :latest is a separate tag
    # pointing at the same digest; we only ADD it, never delete here.
    # Path A (decided 2026-05-25): codeberg.org/operate-first/release-tools
    # Registry: codeberg.org/operate-first/release-tools
  params:
    - name: IMAGE_REPO_DIGEST
      description: Full digest reference (e.g. codeberg.org/operate-first/release-tools@sha256:abc123).
      type: string
    - name: TAG
      description: Human-readable tag to promote to (e.g. v1.0.0).
      type: string
    - name: REGISTRY_IMAGE
      description: |
        Registry image path without tag.
        # Path A (decided 2026-05-25): codeberg.org/operate-first/release-tools
        # Working assumption: codeberg.org/operate-first/release-tools
      type: string
      default: "codeberg.org/operate-first/release-tools"
  workspaces:
    - name: registry-credentials
      mountPath: /workspace/registry-creds
      optional: false
  results:
    - name: IMAGE_REF
      description: Full tagged reference (e.g. codeberg.org/operate-first/release-tools:v1.0.0).
  steps:
    - name: promote-tag
      image: quay.io/skopeo/stable:latest
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        SRC="$(params.IMAGE_REPO_DIGEST)"
        TAG="$(params.TAG)"

        REGISTRY_AUTH_FILE="$(workspaces.registry-credentials.path)/.dockerconfigjson"
        if [ ! -f "${REGISTRY_AUTH_FILE}" ]; then
          REGISTRY_AUTH_FILE="$(workspaces.registry-credentials.path)/config.json"
        fi

        # The version tag was already pushed (and signed in place) upstream.
        # Record it as the canonical reference for Tekton Chains / consumers.
        printf '%s' "$(params.REGISTRY_IMAGE):${TAG}" > "$(results.IMAGE_REF.path)"
        echo "Version tag already published: $(params.REGISTRY_IMAGE):${TAG}"

        # Add :latest ONLY for stable releases. The pipeline triggers on any
        # v* tag, including pre-releases (vX.Y.Z-alpha.N / -beta.N / -rc.N), and
        # :latest must never point at a pre-release. A semver pre-release carries
        # a "-" segment; stable tags do not. skopeo copy preserves the exact
        # digest; no re-push of image layers.
        case "${TAG}" in
          *-*)
            echo "Pre-release ${TAG}: skipping :latest promotion"
            ;;
          *)
            LATEST="$(params.REGISTRY_IMAGE):latest"
            skopeo copy \
              --authfile="${REGISTRY_AUTH_FILE}" \
              "docker://${SRC}" \
              "docker://${LATEST}"
            echo "Promoted: ${LATEST}"
            ;;
        esac
