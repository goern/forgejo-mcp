apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: openspec-validate-pr
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && target_branch == "main" && (
        files.all.exists(f, f.startsWith('openspec/')) ||
        files.all.exists(f, f == '.tekton/openspec-validate-pr.yaml') ||
        files.all.exists(f, f == '.tekton/openspec-validate-push.yaml') ||
        files.all.exists(f, f == '.tekton/tasks/openspec-validate.yaml')
      )
    pipelinesascode.tekton.dev/task: "[git-clone, .tekton/tasks/openspec-validate.yaml]"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
spec:
  params:
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    workspaces:
      - name: source
    tasks:
      - name: fetch-source
        taskRef:
          name: git-clone
        workspaces:
          - name: output
            workspace: source
        params:
          - name: url
            value: $(params.repo_url)
          - name: revision
            value: $(params.revision)

      - name: validate
        taskRef:
          name: openspec-validate
        runAfter:
          - fetch-source
        workspaces:
          - name: source
            workspace: source

  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
