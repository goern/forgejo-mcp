name: release

# Soft-disabled 2026-05-25 (bead forgejo-mcp-n85): the op1st Tekton release
# pipeline (.tekton/on-tag-push-release.yaml, PR #150) is now the primary
# release path on tag push. This workflow stays in tree as a manual
# fallback — re-enable by restoring `push: { tags: ['v*'] }`, or trigger
# ad-hoc via Codeberg UI -> Actions -> Run workflow.
# Full removal is deferred to forgejo-mcp-gdz, after two consecutive
# successful Tekton releases satisfy the cutover criteria in
# docs/design/release-pipeline-migration.md.
on:
  workflow_dispatch:

jobs:
  release:
    permissions:
      packages: write
      contents: write
    runs-on: codeberg-small
    steps:
      # https://code.forgejo.org/actions/checkout
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # fetch full history to allow goreleaser to generate the full changelog
          fetch-depth: 0

      # https://code.forgejo.org/actions/setup-go
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      # syft generates the per-archive CycloneDX SBOMs referenced in
      # .goreleaser.yml's sboms: section. Install before GoReleaser.
      - name: Install syft
        env:
          SYFT_VERSION: v1.18.1
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
          syft version

      # cosign is invoked conditionally after the release publish step. Install
      # here so the binary is available; signing itself is gated on the
      # COSIGN_PRIVATE_KEY secret being set.
      - name: Install cosign
        env:
          COSIGN_VERSION: v2.4.1
        run: |
          set -euo pipefail
          curl -sSfL -o /usr/local/bin/cosign \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          chmod +x /usr/local/bin/cosign
          cosign version

      # https://github.com/goreleaser/goreleaser-action
      - name: Run GoReleaser
        uses: https://github.com/goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --parallelism 2
        env:
          GORELEASER_FORCE_TOKEN: gitea
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      # Boot the freshly-built linux/amd64 binary and verify the version banner
      # contains the tag. Catches LDFLAGS-injection regressions and dead binaries
      # before the .mcpb packaging step ships them to users.
      - name: Smoke-test linux/amd64 binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BIN=$(find dist -type f -name forgejo-mcp -path "*linux_amd64*" | head -1)
          if [ -z "$BIN" ]; then
            echo "::error::No linux/amd64 binary found in dist/" >&2
            exit 1
          fi
          chmod +x "$BIN"
          BANNER=$("$BIN" version 2>&1 | head -1 || true)
          echo "Banner: $BANNER"
          if ! echo "$BANNER" | grep -qE "^forgejo-mcp ${VERSION}([+-]|$)"; then
            echo "::error::Smoke-test failed: banner '$BANNER' does not match expected version '${VERSION}'" >&2
            exit 1
          fi

      # Sign the checksums.txt file with cosign (covers all archives + SBOMs
      # transitively via the checksum chain). Skipped if COSIGN_PRIVATE_KEY
      # is not set, so releases work today and become signed once the secret
      # is provisioned. To enable: generate keypair with `cosign generate-key-pair`,
      # add COSIGN_PRIVATE_KEY + COSIGN_PASSWORD repo secrets, commit cosign.pub.
      - name: Sign checksums with cosign
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPO: ${{ github.repository }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "::warning::COSIGN_PRIVATE_KEY not set; skipping signature step."
            exit 0
          fi
          VERSION="${TAG#v}"
          CHECKSUMS="dist/forgejo-mcp_${VERSION}_checksums.txt"
          if [ ! -f "$CHECKSUMS" ]; then
            echo "::error::Expected $CHECKSUMS not produced by GoReleaser" >&2
            exit 1
          fi

          SIG="${CHECKSUMS}.sig"
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s' "$COSIGN_PRIVATE_KEY" > "$KEY_FILE"

          cosign sign-blob --yes \
            --key "$KEY_FILE" \
            --output-signature "$SIG" \
            "$CHECKSUMS"

          RELEASE_ID=$(curl -fsSL \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "https://codeberg.org/api/v1/repos/${REPO}/releases/tags/${TAG}" \
            | jq -r '.id')

          for f in "$SIG"; do
            ASSET_NAME=$(basename "$f")
            curl -fsSL -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${f}" \
              "https://codeberg.org/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}"
          done

      # https://code.forgejo.org/actions/setup-node
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build and attach .mcpb (Claude Desktop Extension) per platform
        env:
          TAG: ${{ github.ref_name }}
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          RELEASE_ID=$(curl -fsSL \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "https://codeberg.org/api/v1/repos/${REPO}/releases/tags/${TAG}" \
            | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Could not resolve release ID for tag ${TAG}" >&2
            exit 1
          fi

          cp extension/manifest.json extension/manifest.json.orig
          trap 'mv -f extension/manifest.json.orig extension/manifest.json 2>/dev/null || true' EXIT

          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              rm -rf extension/bin
              mkdir -p extension/bin

              BIN=$(find dist -type f -name forgejo-mcp -path "*${goos}_${goarch}*" | head -1)
              if [ -z "$BIN" ]; then
                echo "No binary for ${goos}_${goarch} in dist/" >&2
                exit 1
              fi
              cp "$BIN" extension/bin/forgejo-mcp
              chmod +x extension/bin/forgejo-mcp

              cp extension/manifest.json.orig extension/manifest.json
              jq --arg v "$VERSION" '.version=$v' extension/manifest.json > extension/manifest.json.tmp
              mv extension/manifest.json.tmp extension/manifest.json

              OUT="dist/forgejo-mcp_${VERSION}_${goos}_${goarch}.mcpb"
              npx -y @anthropic-ai/mcpb pack extension/ "$OUT"

              ASSET_NAME=$(basename "$OUT")
              curl -fsSL -X POST \
                -H "Authorization: token ${GITEA_TOKEN}" \
                -F "attachment=@${OUT}" \
                "https://codeberg.org/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}"
            done
          done